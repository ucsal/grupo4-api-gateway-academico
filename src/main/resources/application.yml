server:
  port: 8080

spring:
  application:
    name: apigateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          "[/**]":
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods: "*"
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          routes:
            - id: auth-service
              uri: lb://PROFESSORES-AUTH
              predicates:
                - Path=/api/login/**

            - id: docentes-service
              uri: lb://DOCENTES
              predicates:
                - Path=/api/professores/**, /api/formacoes/**, /api/interesses/**, /api/disponibilidades/**
              filters:
                - AuthenticationFilter

            - id: academico-service
              uri: lb://MS-ACADEMICO
              predicates:
                - Path=/api/disciplina/**, /api/horario/**
              filters:
                - AuthenticationFilter

            - id: institucional-service
              uri: lb://ms-institucional
              predicates:
                - Path=/api/ies/**, /api/escolas/**, /api/coordenadores/**
              filters:
                - AuthenticationFilter

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

api:
  jwt:
    secret: ${JWT_SECRET:UMACHAVESECRETADASUAAPIAQUIUMACHAVESECRETADASUAAPIAQUIUMACHAVESECRETADASUAAPIAQUIUMACHAVESECRETADASUAAPIAQUI}

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    com.grupo4.apigateway: DEBUG
